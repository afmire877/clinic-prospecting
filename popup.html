<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 300px;
      padding: 20px;
      font-family: Arial, sans-serif;
    }
    button {

      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;

      margin-top: 10px;

    }
    .success {

    }

    }

</head>
